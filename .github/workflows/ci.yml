name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Verify required tools
        run: |
          command -v git
          command -v make
          command -v zip
          command -v unzip

      - name: Run tests
        run: make test

      - name: Build package
        run: make package

      - name: Inspect package archive
        run: unzip -l dist/harness.zip
